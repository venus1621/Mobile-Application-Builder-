<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Bahiran Delivery – No Connection</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --brown-dark:  #3B1A0A;
      --brown-mid:   #5C2A10;
      --brown-rich:  #7A3B18;
      --cream:       #F5EFE6;
      --white:       #FDFAF6;
      --accent:      #C8651A;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%; width: 100%;
      overflow: hidden;
      background: var(--brown-dark);
      font-family: 'DM Sans', sans-serif;
      color: var(--cream);
    }

    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none; z-index: 0;
    }

    body::after {
      content: '';
      position: fixed;
      top: -20%; left: 50%;
      transform: translateX(-50%);
      width: 80vw; height: 80vw;
      background: radial-gradient(circle, rgba(122,59,24,0.45) 0%, transparent 70%);
      pointer-events: none; z-index: 0;
    }

    .scene {
      position: relative; z-index: 1;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .logo-wrap {
      position: relative;
      width: 120px; height: 120px;
      margin-bottom: 2.4rem;
      animation: floatUp 0.7s cubic-bezier(.22,.68,0,1.2) both;
    }

    .logo-circle {
      width: 120px; height: 120px;
      border-radius: 50%;
      background: var(--brown-mid);
      box-shadow:
        0 0 0 2px rgba(200,101,26,0.25),
        0 0 40px rgba(200,101,26,0.18),
        0 8px 32px rgba(0,0,0,0.5);
      overflow: hidden;
    }

    .logo-circle img {
      width: 100%; height: 100%;
      object-fit: cover;
      border-radius: 50%;
    }

    .logo-wrap::after {
      content: '';
      position: absolute;
      inset: -10px;
      border-radius: 50%;
      border: 1.5px solid rgba(200,101,26,0.3);
      animation: pulseRing 2.5s ease-out infinite;
    }

    .brand {
      font-family: 'Playfair Display', serif;
      font-size: 1.75rem; font-weight: 700;
      letter-spacing: 0.02em; color: var(--white);
      animation: fadeSlide 0.6s 0.2s both;
    }
    .brand span { color: var(--accent); }

    .tagline {
      font-size: 0.72rem; font-weight: 300;
      letter-spacing: 0.22em; text-transform: uppercase;
      color: rgba(245,239,230,0.45);
      margin-top: 0.3rem; margin-bottom: 2.8rem;
      animation: fadeSlide 0.6s 0.3s both;
    }

    .divider {
      width: 48px; height: 1px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      margin-bottom: 2.2rem;
      animation: fadeSlide 0.6s 0.35s both;
    }

    .wifi-icon {
      width: 56px; height: 44px;
      margin-bottom: 1.6rem;
      animation: fadeSlide 0.6s 0.4s both;
    }

    .wifi-icon svg {
      width: 56px; height: 44px;
      filter: drop-shadow(0 2px 8px rgba(200,101,26,0.3));
    }

    .title {
      font-family: 'Playfair Display', serif;
      font-size: 1.35rem; font-weight: 500;
      color: var(--cream); text-align: center;
      margin-bottom: 0.65rem;
      animation: fadeSlide 0.6s 0.45s both;
    }

    .subtitle {
      font-size: 0.85rem; font-weight: 300;
      color: rgba(245,239,230,0.55);
      text-align: center; line-height: 1.6;
      max-width: 260px;
      animation: fadeSlide 0.6s 0.5s both;
    }

    /* Status indicator */
    .status-pill {
      margin-top: 1.4rem;
      display: flex; align-items: center; gap: 0.5rem;
      padding: 0.4rem 1rem;
      border-radius: 50px;
      background: rgba(245,239,230,0.06);
      border: 1px solid rgba(245,239,230,0.1);
      font-size: 0.72rem; letter-spacing: 0.1em;
      text-transform: uppercase;
      color: rgba(245,239,230,0.4);
      animation: fadeSlide 0.6s 0.55s both;
      transition: all 0.3s;
    }

    .status-pill.checking {
      color: rgba(200,101,26,0.8);
      border-color: rgba(200,101,26,0.3);
    }

    .status-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: rgba(245,239,230,0.3);
      transition: background 0.3s;
    }

    .status-pill.checking .status-dot {
      background: var(--accent);
      animation: blink 1s ease-in-out infinite;
    }

    .retry-btn {
      margin-top: 2.2rem;
      display: flex; align-items: center; gap: 0.6rem;
      padding: 0.85rem 2rem;
      background: linear-gradient(135deg, var(--brown-rich), var(--accent));
      border: none; border-radius: 50px;
      color: var(--white);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem; font-weight: 500;
      letter-spacing: 0.04em; cursor: pointer;
      box-shadow: 0 4px 20px rgba(200,101,26,0.35);
      transition: transform 0.15s, box-shadow 0.15s, opacity 0.15s;
      animation: fadeSlide 0.6s 0.6s both;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }

    .retry-btn:active { transform: scale(0.96); }
    .retry-btn:disabled { opacity: 0.6; }

    .retry-btn svg {
      width: 16px; height: 16px;
      transition: transform 0.4s;
    }

    .retry-btn.spinning svg {
      animation: spin 0.7s linear infinite;
    }

    .dots {
      position: fixed; bottom: 2.5rem;
      display: flex; gap: 0.45rem;
      animation: fadeSlide 0.6s 0.7s both;
    }
    .dots span {
      width: 4px; height: 4px; border-radius: 50%;
      background: rgba(200,101,26,0.35);
    }
    .dots span:nth-child(2) {
      background: rgba(200,101,26,0.6);
      width: 5px; height: 5px;
    }

    @keyframes floatUp {
      from { opacity: 0; transform: translateY(24px) scale(0.88); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }
    @keyframes fadeSlide {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes pulseRing {
      0%   { transform: scale(1);    opacity: 0.6; }
      60%  { transform: scale(1.18); opacity: 0; }
      100% { transform: scale(1.18); opacity: 0; }
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.3; }
    }
  </style>
</head>
<body>
  <div class="scene">
    <div class="logo-wrap">
      <div class="logo-circle">
        <img src="https://res.cloudinary.com/dnafzycea/image/upload/v1774702874/output-smallpngtools_ve2ebh.png" alt="Bahiran Delivery" />
      </div>
    </div>

    <div class="brand">Bahiran <span>Delivery</span></div>
    <div class="tagline">Premium Food Delivery</div>
    <div class="divider"></div>

    <div class="wifi-icon">
      <svg viewBox="0 0 56 44" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M4 18 Q28 2 52 18" stroke="rgba(245,239,230,0.15)" stroke-width="3.5" stroke-linecap="round" fill="none"/>
        <path d="M10 26 Q28 14 46 26" stroke="rgba(245,239,230,0.2)" stroke-width="3.5" stroke-linecap="round" fill="none"/>
        <path d="M17 34 Q28 26 39 34" stroke="rgba(245,239,230,0.3)" stroke-width="3.5" stroke-linecap="round" fill="none"/>
        <circle cx="28" cy="41" r="3.5" fill="#C8651A"/>
        <line x1="8" y1="6" x2="48" y2="38" stroke="#C8651A" stroke-width="3" stroke-linecap="round"/>
        <line x1="48" y1="6" x2="8" y2="38" stroke="#C8651A" stroke-width="3" stroke-linecap="round"/>
      </svg>
    </div>

    <div class="title">No Internet Connection</div>
    <div class="subtitle">Please check your connection and try again to continue ordering.</div>

    <div class="status-pill" id="statusPill">
      <div class="status-dot" id="statusDot"></div>
      <span id="statusLabel">Waiting for connection…</span>
    </div>

    <button class="retry-btn" id="retryBtn" onclick="handleRetry()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M1 4v6h6"/><path d="M23 20v-6h-6"/>
        <path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 0 1 3.51 15"/>
      </svg>
      Try Again
    </button>

    <div class="dots">
      <span></span><span></span><span></span>
    </div>
  </div>

  <script>
    const pill   = document.getElementById('statusPill')
    const label  = document.getElementById('statusLabel')
    const btn    = document.getElementById('retryBtn')

    // ── Check real connectivity ──
    async function checkOnline() {
      if (!navigator.onLine) return false
      try {
        const res = await fetch('https://app.bahirandelivery.com/api/config/fees', {
          method: 'HEAD',
          cache: 'no-store',
          signal: AbortSignal.timeout(5000),
        })
        return res.ok || res.status < 500
      } catch {
        return false
      }
    }

    function goToApp() {
      window.location.replace('/index.html')
    }

    async function handleRetry() {
      btn.classList.add('spinning')
      btn.disabled = true
      pill.classList.add('checking')
      label.textContent = 'Checking connection…'

      const online = await checkOnline()

      if (online) {
        label.textContent = 'Connected! Loading…'
        setTimeout(goToApp, 400)
      } else {
        btn.classList.remove('spinning')
        btn.disabled = false
        pill.classList.remove('checking')
        label.textContent = 'Still no connection'
        setTimeout(() => {
          label.textContent = 'Waiting for connection…'
        }, 2000)
      }
    }

    // Auto-retry when OS reports online
    window.addEventListener('online', async () => {
      pill.classList.add('checking')
      label.textContent = 'Connection detected…'
      // Small delay — 'online' fires before actual connectivity sometimes
      await new Promise(r => setTimeout(r, 1500))
      const online = await checkOnline()
      if (online) goToApp()
      else {
        pill.classList.remove('checking')
        label.textContent = 'Waiting for connection…'
      }
    })

    // Poll every 10 seconds as fallback
    setInterval(async () => {
      if (navigator.onLine) {
        const online = await checkOnline()
        if (online) goToApp()
      }
    }, 10000)
  </script>
</body>
</html>
